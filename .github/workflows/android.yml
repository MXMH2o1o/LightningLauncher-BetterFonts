name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        working-directory: Launcher
        run: gradle wrapper

      - name: Grant execute permission for gradlew
        working-directory: Launcher
        run: chmod +x gradlew

      - name: Remove Google Services plugin
        working-directory: Launcher
        run: |
          sed -i "s/apply plugin: 'com.google.gms.google-services'//g" App/build.gradle
          sed -i "s/apply plugin: 'com.google.firebase.crashlytics'//g" App/build.gradle

      - name: Build debug APK
        working-directory: Launcher
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LightningLauncher-debug
          path: Launcher/App/build/outputs/apk/debug/*.apk
